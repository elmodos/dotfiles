set -g mouse on
set -g prefix C-b

set -g status on
set -g status-interval 15

set -g status-position bottom

set -g status-style bg=green,fg=black

# Active window
setw -g window-status-current-style default
setw -g window-status-current-format "#[bg=red,fg=white,bold] #I#{?window_zoomed_flag,+,} #[bg=terminal,fg=terminal] #W "

# Incative windows
setw -g window-status-style default
setw -g window-status-format "#[bg=orange,fg=black] #I#{?window_zoomed_flag,+,} #[bg=default,fg=default] #W "

set -g status-left-length 10
set -g status-left-style default
set -g status-left "[#{session_name}] "

set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %H:%M %d-%b-%y"
set -g status-right-length 40

set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

